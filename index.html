<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iVolt Sovereign Dashboard</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --neon: #00f2ff; }
        body { 
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); 
            color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px;
        }
        .card {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
            padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.37);
        }
        .stats { display: flex; justify-content: space-between; align-items: center; }
        .neon-text { color: var(--neon); font-weight: bold; text-shadow: 0 0 10px var(--neon); }
        .btn {
            background: var(--neon); color: black; border: none; width: 100%;
            padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🛡️ iVolt Sovereign</h2>
        <div class="stats">
            <div>Battery: <span id="batt" class="neon-text">--%</span></div>
            <div>Mode: <span id="mode" class="neon-text">SAVER</span></div>
        </div>
    </div>

    <div class="card">
        <h3>📈 Market Pulse (NGN)</h3>
        <canvas id="marketChart"></canvas>
    </div>

    <button class="btn" onclick="Telegram.WebApp.close()">Return to Chat</button>

    <script>
        // Initialize Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 2026 Charting Logic
        const ctx = document.getElementById('marketChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['08:00', '12:00', '16:00', '20:00'],
                datasets: [{
                    label: 'USD/NGN',
                    data: [1350, 1385, 1392, 1385],
                    borderColor: '#00f2ff',
                    tension: 0.4
                }]
            },
            options: { plugins: { legend: { display: false } } }
        });

        // Pull Battery Data from URL Params (passed by your bot)
        const params = new URLSearchParams(window.location.search);
        document.getElementById('batt').innerText = (params.get('batt') || '85') + '%';
    </script>
</body>
</html>
